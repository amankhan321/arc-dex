# DigitalOcean droplet deployment.
#
# Caddy sits in front and gets you an automatic, auto-renewing Let's Encrypt
# certificate just by naming a domain — no certbot, no cron, no expiry surprise.
services:
  web:
    build: ./web
    restart: unless-stopped
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config:
